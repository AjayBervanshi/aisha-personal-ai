architect_task:
  description: >
    Analyze the following request: {task_description}. Look through the codebase using your file tools to
    understand where the new code should go. Produce a technical specification and step-by-step plan for the Developer.
  expected_output: >
    A detailed architectural plan and implementation guide.
  agent: architect

write_code_task:
  description: >
    Read the architectural plan from Archie. Write the Python code to solve the task: {task_description}. The code must be production-ready,
    follow PEP-8, and be designed as an Aisha 'skill' using the @aisha_skill decorator if applicable. Use your write_file tool to save it.
  expected_output: >
    A well-documented Python file saved to disk.
  agent: dev

test_code_task:
  description: >
    CRITICAL: You MUST execute the tests.
    Take the code written by the Dev agent and write a comprehensive unittest test suite using write_file.
    You MUST then use the 'run_python_tests' tool to execute that test file. DO NOT just do syntax validation.
    If the tests fail, you must report the exact failure output back to the Developer.
    If they pass, report the success. You are forbidden from returning an expected_output without a passing test run log.
  expected_output: >
    A complete Python unittest script, along with the raw terminal output proving the tests PASSED successfully.
  agent: tester

review_code_task:
  description: >
    Review the code saved to disk and the test results. Check for any security issues (like hardcoded keys),
    logic flaws, and overall code quality. If everything is perfect, provide a final approval summarizing the code.
  expected_output: >
    A detailed review report ending with either 'APPROVED' or a list of required fixes.
  agent: reviewer
