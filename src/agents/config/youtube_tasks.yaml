research_task:
  description: Find a viral romance trope (e.g., Enemies to Lovers, Fake Dating, Forbidden Kiss) related to {topic}.
  expected_output: A story brief including character names, core conflict, and the emotional hook.
  agent: riya

script_task:
  description: Write a high-tension, cinematic script (Short or Long form as requested). Focus on REAL dialogue and emotional hooks in the first 5 seconds.
  expected_output: Full script with Dialogue, Narration, and Scene notes.
  agent: lexi

audio_task:
  description: Generate voiceover parameters. If it's Aisha's channel, keep it warm. If it's Riya's, keep it deep and seductive.
  expected_output: Complete voiceover script and file manifest.
  agent: aria

visual_task:
  description: Design 5-10 detailed prompts for cinematic visuals that match the specific channel's aesthetic (Golden Hour vs. Dark Noir).
  expected_output: A list of visual scene prompts and thumbnail idea.
  agent: mia

marketing_task:
  description: Create a viral title, 500-word seductive description, caption for Reels/Instagram, and 30 targeted hashtags for the romance niche.
  expected_output: Full SEO & Social Media package.
  agent: cappy
